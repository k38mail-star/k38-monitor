<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>K38 DLT | 集群监控面板</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;overflow-x:hidden}
a{color:#58a6ff;text-decoration:none}

/* ── 布局 ── */
.container{display:flex;min-height:100vh}
.sidebar{width:200px;background:#161b22;border-right:1px solid #30363d;padding:12px 0;flex-shrink:0}
.main{flex:1;padding:16px;max-width:100%;overflow-x:hidden}
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:10px}
}

/* ── 侧栏 ── */
.sidebar .logo{padding:12px 16px;font-size:16px;font-weight:600;border-bottom:1px solid #30363d;margin-bottom:8px}
.sidebar .logo span{color:#58a6ff}
.sidebar nav{padding:0 8px}
.sidebar nav a{display:block;padding:8px 12px;color:#8b949e;font-size:13px;border-radius:6px;margin:2px 0}
.sidebar nav a:hover,.sidebar nav a.active{color:#e6edf3;background:#1c2333}
.sidebar nav a .icon{margin-right:8px}

/* ── 顶部指标条 ── */
.metric-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.metric-card{flex:1;min-width:130px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 14px}
.metric-card .label{font-size:11px;color:#8b949e;margin-bottom:4px}
.metric-card .value{font-size:20px;font-weight:600;color:#e6edf3}
.metric-card .value.pulse{color:#58a6ff}

/* ── 节点网格 ── */
.nodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
@media(max-width:768px){
  .nodes-grid{grid-template-columns:repeat(2,1fr);gap:8px}
}
.node-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;position:relative}
.node-card.online{border-left:3px solid #3fb950}
.node-card.offline{border-left:3px solid #f85149;opacity:.7}
.node-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.node-header .name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.node-header .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.node-header .status-dot.online{background:#3fb950;box-shadow:0 0 6px #3fb95066}
.node-header .status-dot.offline{background:#f85149}
.node-header .uptime{font-size:11px;color:#8b949e;margin-left:auto;white-space:nowrap}
.bars{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.bar-row{display:flex;align-items:center;gap:6px;font-size:11px}
.bar-row .bar-label{width:48px;text-align:right;color:#8b949e;flex-shrink:0}
.bar-row .bar-track{flex:1;height:4px;background:#21262d;border-radius:2px;overflow:hidden}
.bar-row .bar-fill{height:100%;border-radius:2px;transition:width 1s}
.bar-row .bar-val{width:36px;text-align:right;color:#8b949e;flex-shrink:0;font-variant-numeric:tabular-nums}

/* ── 趋势图展开区 ── */
.trend-toggle{display:block;width:100%;margin-top:8px;padding:6px 0;background:0;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;cursor:pointer;text-align:center;transition:all .2s}
.trend-toggle:hover{border-color:#58a6ff;background:#1c2333}
.trend-area{display:none;margin-top:10px;border-top:1px solid #30363d;padding-top:10px}
.trend-area.open{display:block}
.trend-area svg{width:100%;height:180px;display:block}
.trend-legend{display:flex;gap:12px;margin-top:6px;font-size:11px;color:#8b949e;flex-wrap:wrap}
.trend-legend-item{display:flex;align-items:center;gap:4px}
.trend-legend-dot{width:8px;height:8px;border-radius:50%}
.trend-tooltip{position:absolute;background:#1c2333;border:1px solid #58a6ff;border-radius:6px;padding:6px 10px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:100}

/* ── 状态栏 ── */
.status-bar{margin-top:16px;padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#8b949e}
.status-bar .item{display:flex;align-items:center;gap:4px}
.status-bar .item .icon{font-size:14px}

/* ── 底部 ── */
.footer{text-align:center;padding:16px;font-size:11px;color:#30363d}

/* ── 编辑按钮 ── */
#editBtn{position:fixed;bottom:14px;right:14px;width:44px;height:44px;border-radius:50%;background:#1f6feb;border:none;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .2s}
#editBtn:hover{transform:scale(1.1)}
#editPanel{position:fixed;bottom:70px;right:14px;width:320px;max-height:400px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;display:none;z-index:89}
#editPanel textarea{width:100%;height:180px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px;font-size:11px;font-family:monospace;resize:vertical}
#editPanel .btn-row{display:flex;gap:6px;margin-top:6px}
#editPanel .btn-row button{padding:4px 10px;border-radius:4px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:11px;cursor:pointer;flex:1}
#editPanel .btn-row button.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
</style>
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <div class="logo">💰 <span>K38</span> DLT</div>
    <nav>
      <a href="#" class="active"><span class="icon">📊</span>总览</a>
      <a href="#"><span class="icon">🌐</span>网络</a>
      <a href="#"><span class="icon">⚙️</span>设置</a>
      <a href="#"><span class="icon">❓</span>帮助</a>
    </nav>
  </aside>
  <main class="main">
<!-- K38 Logo行 -->
  <div style="display:flex;align-items:center;gap:10px;padding:0 0 12px 0;border-bottom:1px solid #30363d;margin-bottom:14px">
    <span style="font-size:22px">💰</span>
    <span style="font-size:18px;font-weight:600;color:#e6edf3">K38</span>
    <span style="font-size:13px;color:#8b949e">Deep Link Trace</span>
    <span style="margin-left:auto;font-size:12px;color:#30363d">v0.5.0</span>
  </div>    <!-- 指标条 -->
    <div class="metric-row" id="metricRow">
      <div class="metric-card"><div class="label">🟢 在线节点</div><div class="value pulse" id="mOnline">--</div></div>
      <div class="metric-card"><div class="label">🌡️ 最高温度</div><div class="value" id="mTemp">--</div></div>
      <div class="metric-card"><div class="label">⏱ 最长运行</div><div class="value" id="mUptime">--</div></div>
      <div class="metric-card"><div class="label">🔄 更新于</div><div class="value" id="mUpdated">--</div></div>
    </div>
    <!-- 节点网格 -->
    <div class="nodes-grid" id="nodesGrid"></div>
    <!-- 状态栏 -->
    
    <!-- 网络状态行 -->
    <div class="metric-row" id="netRow" style="margin-bottom:12px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch">
      <div class="metric-card" style="flex:0 0 auto;min-width:160px;flex-shrink:0">
        <div class="label">🌐 对外延迟</div>
        <div class="value" style="font-size:14px" id="pingBaidu">--</div>
      </div>
      <div class="metric-card" style="flex:0 0 auto;min-width:160px;flex-shrink:0">
        <div class="label">🔗 节点间延迟</div>
        <div class="value" style="font-size:14px" id="nodePings">--</div>
      </div>
      <div class="metric-card" style="flex:0 0 auto;min-width:160px;flex-shrink:0">
        <div class="label">⚡ 高速互联</div>
        <div class="value" style="font-size:14px" id="highSpeedLink">--</div>
      </div>
      <div class="metric-card" style="flex:0 0 auto;min-width:160px;flex-shrink:0">
        <div class="label">🐳 Docker</div>
        <div class="value" style="font-size:14px" id="dockerStatus">--</div>
      </div>
    </div>

    <div class="status-bar" id="statusBar"></div>
    <div class="footer">K38集群监控 · Deep Link Trace</div>
  </main>
</div>
<!-- 编辑按钮 -->
<button id="editBtn">✏️</button>
<div id="editPanel">
  <textarea id="cssEditor" placeholder="/* 自定义CSS */"></textarea>
  <div class="btn-row">
    <button id="applyCSS" class="primary">▶ 应用</button>
    <button id="closeEdit">✕ 关闭</button>
  </div>
</div>
<script>
// ===== 配置 =====
const WS_URL = (location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws';
const API = '/api/v1';

// ===== DOM =====
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const mOnline = $('#mOnline'), mTemp = $('#mTemp'), mUptime = $('#mUptime'), mUpdated = $('#mUpdated');
const nodesGrid = $('#nodesGrid');
const statusBar = $('#statusBar');

// ===== Emoji映射 =====
const NODE_EMOJI = { 'spark-9051':'🦾','spark-9797':'🤖','Jagerm3acStudio.lan':'💻','localhost':'💰','JagerdeMac-Studio.local':'💻','JagerdeMac-Studio-3.local':'💻' };

// ===== 颜色工具 =====
function barColor(pct) {
  if (pct == null) return '#30363d';
  if (pct < 60) return '#3fb950';
  if (pct < 85) return '#d29922';
  return '#f85149';
}

// ===== 渲染趋势图 SVG =====
function renderTrendSVG(points, metric, container) {
  if (!points || points.length < 2) {
    container.innerHTML = '<div style="text-align:center;color:#8b949e;padding:20px;font-size:12px">暂无历史数据</div>';
    return;
  }
  const w = 700, h = 180, padL = 40, padR = 10, padT = 10, padB = 30;
  const cw = w - padL - padR, ch = h - padT - padB;
  const vals = points.map(p => p.value);
  const vmin = 0;
  const vmax = Math.ceil(Math.max(...vals) / 10) * 10 || 100;
  const range = Math.max(vmax - vmin, 1);
  const color = metric === 'temp' ? '#f85149' : metric === 'cpu' ? '#3fb950' : '#58a6ff';
  const gid = 'tg_' + Math.random().toString(36).slice(2,6);

  const scaleY = v => padT + ch - (v - vmin) / range * ch;
  const scaleX = i => padL + (i / (points.length - 1)) * cw;

  let linePts = points.map((p,i) => `${scaleX(i).toFixed(1)},${scaleY(p.value).toFixed(1)}`).join(' ');
  let areaPts = `M${scaleX(0)},${padT+ch} L${linePts} L${scaleX(points.length-1)},${padT+ch} Z`;

  // 纵轴刻度
  let yLabels = '';
  for (let i = 0; i <= 4; i++) {
    const y = padT + ch * (1 - i/4);
    const v = vmin + range * i / 4;
    yLabels += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>`;
    yLabels += `<text x="${padL-5}" y="${y+4}" fill="#8b949e" font-size="10" text-anchor="end">${v.toFixed(v===~~v?0:1)}</text>`;
  }

  // 横轴标签（首尾中）
  let xLabels = '';
  const n = points.length;
  [0, Math.floor(n/2), n-1].forEach(i => {
    const t = new Date(points[i].ts).toTimeString().slice(0,5);
    xLabels += `<text x="${scaleX(i)}" y="${h-6}" fill="#8b949e" font-size="10" text-anchor="${i===0?'start':i===n-1?'end':'middle'}">${t}</text>`;
  });

  // hover点（最后一个）
  const last = points[points.length-1];
  const lx = scaleX(n-1), ly = scaleY(last.value);

  container.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%">
      <defs>
        <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
        </linearGradient>
      </defs>
      ${yLabels}
      ${xLabels}
      <path d="${areaPts}" fill="url(#${gid})"/>
      <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lx}" cy="${ly}" r="3" fill="${color}" stroke="#0d1117" stroke-width="1.5"/>
      <text x="${lx+8}" y="${ly-6}" fill="${color}" font-size="11" font-weight="500">${last.value.toFixed(1)}</text>
    </svg>
  `;
}

// ===== 渲染节点卡片 =====
function renderNodeCard(key, node) {
  const sys = node.system || {};
  const host = node.hostname || key;
  const online = node.online !== false;
  const emoji = NODE_EMOJI[host] || (online ? '🖥️' : '💀');
  const cpu = sys.cpu_pct;
  const mem = sys.mem_pct;
  const gpu = node.gpu_info || {};
  const gpuPct = gpu.utilization != null ? gpu.utilization : null;
  const gpuTemp = gpu.temp != null ? gpu.temp : null;
  const disk = sys.disk_pct;
  const uptime = node.uptime || '--';

  // 名字截断
  const nameMap = {'spark-9051':'大傻','spark-9797':'二傻','Jagerm3acStudio.lan':'十六万','JagerdeMac-Studio-3.local':'三万八','JagerdeMac-Studio.local':'小四'};
  const name = nameMap[host] || host.split('.')[0];

  const bars = [
    { label: 'CPU', val: cpu, max: 100 },
    { label: 'RAM', val: mem, max: 100 },
  ];
  if (gpuPct != null) bars.push({ label: 'GPU', val: gpuPct, max: 100 });
  if (disk != null) bars.push({ label: 'DISK', val: disk, max: 100 });

  const barsHTML = bars.map(b => {
    const pct = b.val != null ? Math.round(b.val) : 0;
    const color = barColor(pct);
    return `<div class="bar-row">
      <span class="bar-label">${b.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="bar-val">${pct}%</span>
    </div>`;
  }).join('');

  return `<div class="node-card ${online?'online':'offline'}">
    <div class="node-header">
      <span>${emoji}</span>
      <span class="name">${name}</span>
      <span class="status-dot ${online?'online':'offline'}"></span>
      <span class="uptime">${uptime}</span>
    </div>
    <div class="bars">${barsHTML}</div>
    <div class="trend-area" id="trend-${key}" data-node="${key}">
      <div style="height:180px"><svg viewBox="0 0 700 180" style="width:100%;height:100%"></svg></div>
      <div class="trend-legend" id="legend-${key}"></div>
    </div>
    <button class="trend-toggle" onclick="toggleTrend('${key}')" id="btn-${key}">📈 查看历史趋势</button>
  </div>`;
}

// ===== 切换趋势图 =====
function toggleTrend(nodeKey) {
  const area = document.getElementById('trend-' + nodeKey);
  const btn = document.getElementById('btn-' + nodeKey);
  const isOpen = area.classList.toggle('open');
  btn.textContent = isOpen ? '📉 收起趋势' : '📈 查看历史趋势';
  if (isOpen) loadTrend(nodeKey, area);
}

async function loadTrend(nodeKey, area) {
  const svgContainer = area.querySelector('div');
  const legend = document.getElementById('legend-' + nodeKey);
  try {
    const [tempRes, cpuRes] = await Promise.all([
      fetch(API + '/history?node=' + encodeURIComponent(nodeKey) + '&metric=temp&minutes=15'),
      fetch(API + '/history?node=' + encodeURIComponent(nodeKey) + '&metric=cpu&minutes=15')
    ]);
    const tempData = await tempRes.json();
    const cpuData = await cpuRes.json();
    // 只画有数据的指标
    if (tempData.points && tempData.points.length > 1) {
      renderTrendSVG(tempData.points, 'temp', svgContainer);
    } else if (cpuData.points && cpuData.points.length > 1) {
      renderTrendSVG(cpuData.points, 'cpu', svgContainer);
    } else {
      svgContainer.innerHTML = '<div style="text-align:center;color:#8b949e;padding:20px;font-size:12px">暂无历史数据</div>';
    }
    legend.innerHTML = '';
    if (tempData.points && tempData.points.length > 1) {
      legend.innerHTML += '<div class="trend-legend-item"><div class="trend-legend-dot" style="background:#f85149"></div> 温度</div>';
    }
    if (cpuData.points && cpuData.points.length > 1) {
      legend.innerHTML += '<div class="trend-legend-item"><div class="trend-legend-dot" style="background:#3fb950"></div> CPU</div>';
    }
    legend.innerHTML += '<span style="color:#30363d">最近15分钟</span>';
  } catch (e) {
    svgContainer.innerHTML = '<div style="text-align:center;color:#f85149;padding:20px;font-size:12px">加载失败</div>';
    console.error(e);
  }
}

// ===== 刷新面板 =====
function renderDashboard(data) {
  if (!data || !data.nodes) return;
  const nodes = data.nodes;
  const nodeKeys = Object.keys(nodes);
  const onlineNodes = nodeKeys.filter(k => nodes[k].online !== false);
  const system = data.system || {};

  // 指标条
  mOnline.textContent = onlineNodes.length + '/' + nodeKeys.length;

  // 最高温度
  let maxTemp = null;
  for (const k of nodeKeys) {
    const gpu = nodes[k].gpu_info || {};
    const t = gpu.temp;
    if (t != null && (maxTemp === null || t > maxTemp)) maxTemp = t;
  }
  mTemp.textContent = maxTemp != null ? maxTemp + '°C' : '--';

  // 最长运行时间
  mUptime.textContent = data.ts_str || '--';
  mUpdated.textContent = data.ts_str || '--';

  // 节点卡片
  nodesGrid.innerHTML = nodeKeys.map(k => renderNodeCard(k, nodes[k])).join('');

  // 网络状态更新
  const pingData = data.ping || {};
  const netData = data.network || {};
  const dockerData = data.docker || {};

  if (pingData.baidu_ms || pingData.ytb_ms || pingData.google_ms || pingData.github_ms) {
    var parts=[];
    if(pingData.baidu_ms) parts.push('CN'+pingData.baidu_ms);
    if(pingData.github_ms) parts.push('GH'+pingData.github_ms);
    if(pingData.ytb_ms) parts.push('YT'+pingData.ytb_ms);
    if(pingData.google_ms) parts.push('GO'+pingData.google_ms);
    if(pingData.yahoo_hk_ms) parts.push('YH'+pingData.yahoo_hk_ms);
    document.getElementById('pingBaidu').textContent = parts.join(' | ');
    document.getElementById('pingBaidu').title = 'ms延迟 (越小越快)';
  }
  if (pingData.node_pings && pingData.node_pings.length) {
    document.getElementById('nodePings').textContent = pingData.node_pings.map(p => p.node + ' ' + p.ms + 'ms').join(' | ');
  }
  const tb = netData.tb || [];
  if (tb.length) {
    document.getElementById('highSpeedLink').textContent = tb.map(t => t.speed).join(' | ');
  } else if (netData.link200) {
    document.getElementById('highSpeedLink').textContent = '200G直连';
  }
  const containers = dockerData.containers || [];
  const dsum = dockerData.summary || (containers.length + ' running');
  document.getElementById('dockerStatus').textContent = typeof dsum === 'string' ? dsum : (containers.length + '容器运行');

  // 状态栏
  let infoHtml = '';
  if (system.docker) infoHtml += `<span class="item"><span class="icon">🐳</span> Docker: ${system.docker.running||0}运行</span>`;
  if (system.ollama) infoHtml += `<span class="item"><span class="icon">🧠</span> Ollama: ${system.ollama.models||0}模型</span>`;
  if (system.network) infoHtml += `<span class="item"><span class="icon">🔗</span> 200G互联</span>`;
  statusBar.innerHTML = infoHtml || '<span class="item">K38集群 · ' + nodeKeys.length + '节点</span>';
}

// ===== WebSocket连接 =====
let lastData = null;
function connectWS() {
  const ws = new WebSocket(WS_URL);
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'data') {
        lastData = msg.payload;
        renderDashboard(lastData);
      }
    } catch(e) {}
  };
  ws.onclose = () => {
    // fallback: HTTP轮询
    setTimeout(fetchLatest, 5000);
    setTimeout(connectWS, 10000);
  };
  ws.onerror = () => {};
}

// HTTP fallback
async function fetchLatest() {
  try {
    const res = await fetch(API + '/latest');
    const data = await res.json();
    if (data && data.nodes) {
      lastData = data;
      renderDashboard(data);
    }
  } catch(e) {}
  setTimeout(fetchLatest, 15000);
}

// ===== 编辑面板 =====
const editBtn = document.getElementById('editBtn');
const editPanel = document.getElementById('editPanel');
const cssEditor = document.getElementById('cssEditor');
let editorOpen = false;

editBtn.addEventListener('click', () => {
  editorOpen = !editorOpen;
  editPanel.style.display = editorOpen ? 'block' : 'none';
  editBtn.textContent = editorOpen ? '✕' : '✏️';
});

document.getElementById('closeEdit').addEventListener('click', () => {
  editorOpen = false;
  editPanel.style.display = 'none';
  editBtn.textContent = '✏️';
});

document.getElementById('applyCSS').addEventListener('click', () => {
  const css = cssEditor.value;
  let styleEl = document.getElementById('customStyle');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'customStyle';
    document.head.appendChild(styleEl);
  }
  styleEl.textContent = css;
});

cssEditor.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') document.getElementById('applyCSS').click();
});

// ===== 启动 =====
connectWS();
fetchLatest();

// 每15秒自动刷新（备用）
setInterval(fetchLatest, 15000);
</script>
